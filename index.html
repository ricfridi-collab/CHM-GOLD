<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة التوجيه والتميز الرابعة متوسط</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@700&family=Reem+Kufi:wght@400;700&family=Times+New+Roman&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        :root {
            --vert-bouteille: #004d40; 
            --gold: #D4AF37; 
            --black: #0a0a0a;
        }

        #activation-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #002d26 0%, #050505 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
            font-family: 'Amiri', serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--gold);
            text-align: center;
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
        }

        .login-card i { font-size: 50px; color: var(--gold); margin-bottom: 20px; }
        .login-card h2 { font-family: 'Reem Kufi', sans-serif; color: #fff; margin-bottom: 15px; }
        
        #activationCode {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--gold);
            border-radius: 8px;
            color: #fff;
            text-align: center;
            font-size: 18px;
            outline: none;
        }

        .btn-activate {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        .loading-spinner { display: none; margin-top: 15px; color: var(--gold); }
        #main-content { display: none; }
    </style>
</head>
<body>

    <div id="activation-screen">
        <div class="login-card">
            <i class="fas fa-shield-alt"></i>
            <h2>تفعيل الدخول</h2>
            <p style="color: #ccc;">أدخل كود التفعيل الخاص بك</p>
            <input type="text" id="activationCode" placeholder="CHM-26-XXXX">
            <button class="btn-activate" onclick="validateCode()">دخول</button>
            <div id="spinner" class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> جاري التحقق...</div>
            <p id="error-msg" style="color: #ff5252; margin-top: 15px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="main-content">
        <header>
            <div class="main-title">فالنجمع الخيرين معا </div>
            <div class="signature">Designed by Dr.Chouidira Mohamed</div>
        </header>
        </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/t3mym6k81l33y";

        window.onload = function() {
            if (localStorage.getItem('app_verified') === 'true') {
                showMainContent();
            }
        };

        function getDeviceID() {
            // توليد بصمة أكثر دقة للجهاز
            return btoa(navigator.userAgent + screen.width + screen.height).slice(0, 20);
        }

        async function validateCode() {
            const codeInput = document.getElementById('activationCode').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const spinner = document.getElementById('spinner');

            if (!codeInput) {
                errorMsg.innerText = "يرجى إدخال الكود";
                return;
            }

            errorMsg.innerText = "";
            spinner.style.display = "block";

            try {
                // طلب الكود المحدد فقط من SheetDB لزيادة الدقة
                const response = await fetch(`${API_URL}/search?code=${codeInput}`);
                const results = await response.json();
                
                if (results.length > 0) {
                    const record = results[0];
                    const currentDevice = getDeviceID();

                    // 1. استثناء أكواد المسؤول (Admin)
                    if (codeInput.includes("MASTER-2026") || codeInput.includes("ROOT-88")) {
                        grantAccess();
                        return;
                    }

                    // 2. التحقق: هل الكود فارغ (جديد)؟
                    if (!record.status || record.status === "" || record.status === "active") {
                        // تحديث الشيت ببصمة الجهاز الحالية فوراً
                        const updateResponse = await fetch(`${API_URL}/code/${codeInput}`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ "status": currentDevice })
                        });

                        if (updateResponse.ok) {
                            grantAccess();
                        } else {
                            errorMsg.innerText = "خطأ في تسجيل التفعيل. حاول مجدداً.";
                        }
                    } 
                    // 3. التحقق: هل بصمة الجهاز المسجلة تطابق الجهاز الحالي؟
                    else if (record.status === currentDevice) {
                        grantAccess();
                    } 
                    // 4. الكود مستخدم من قبل جهاز آخر
                    else {
                        errorMsg.innerText = "عذراً! هذا الكود تم تفعيله مسبقاً على جهاز آخر.";
                    }
                } else {
                    errorMsg.innerText = "الكود الذي أدخلته غير موجود.";
                }
            } catch (e) {
                errorMsg.innerText = "خطأ في الاتصال بالقاعدة. تأكد من الإنترنت.";
                console.error(e);
            } finally {
                spinner.style.display = "none";
            }
        }

        function grantAccess() {
            localStorage.setItem('app_verified', 'true');
            showMainContent();
        }

        function showMainContent() {
            document.getElementById('activation-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
